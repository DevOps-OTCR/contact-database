name: Deploy Next.js static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Resolve base path
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_BASE_PATH: ${{ secrets.NEXT_PUBLIC_BASE_PATH || vars.NEXT_PUBLIC_BASE_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          BASE_PATH="$NEXT_PUBLIC_BASE_PATH"

          if [ -z "$BASE_PATH" ] && [ -n "$NEXT_PUBLIC_SITE_URL" ]; then
            BASE_PATH=$(node -e "try { const u = new URL(process.argv[1]); const p = u.pathname.replace(/\/$/, ''); console.log(p === '/' ? '' : p); } catch { console.log(''); }" "$NEXT_PUBLIC_SITE_URL")
          fi

          if [ -z "$BASE_PATH" ] && [ -z "$NEXT_PUBLIC_SITE_URL" ]; then
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            USER_PAGES_REPO="${GITHUB_REPOSITORY_OWNER}.github.io"
            if [ "$REPO_NAME" != "$USER_PAGES_REPO" ]; then
              BASE_PATH="/$REPO_NAME"
            fi
          fi

          echo "NEXT_PUBLIC_BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          echo "Using NEXT_PUBLIC_BASE_PATH=${BASE_PATH:-<root>}"

      - name: Validate required public env
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "Missing NEXT_PUBLIC_SUPABASE_URL (set as repo/environment secret or variable)."
            missing=1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY (set as repo/environment secret or variable)."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build static export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || vars.NEXT_PUBLIC_SITE_URL }}
        run: npm run build

      - name: Ensure Pages serves _next assets
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
